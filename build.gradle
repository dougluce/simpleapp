buildscript {
    repositories {
        google()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.0.3'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.5.31'
    }
}

plugins {
    id 'nu.studer.credentials' version '3.0'
}

apply plugin: 'nu.studer.credentials'

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

